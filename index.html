<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Image Automation Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6cfc;
    --accent2: #fc6cc8;
    --accent3: #6cfcca;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --error: #fc6c6c;
    --success: #6cfcca;
    --radius: 14px;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ── GRID BACKGROUND ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,108,252,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,108,252,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 56px;
    position: relative;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(124,108,252,0.12);
    border: 1px solid rgba(124,108,252,0.3);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .header-badge .dot {
    width: 6px; height: 6px;
    background: var(--accent3);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e8e8f0 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 14px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.04em;
  }

  /* ── FORM CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── FORM ELEMENTS ── */
  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,108,252,0.12);
  }

  textarea {
    resize: vertical;
    min-height: 90px;
    line-height: 1.6;
  }

  input::placeholder, textarea::placeholder {
    color: var(--muted);
    opacity: 0.6;
  }

  /* ── DIMENSIONS ROW ── */
  .dim-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: end;
  }

  .dim-sep {
    color: var(--muted);
    font-size: 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    padding-bottom: 14px;
    text-align: center;
  }

  /* ── SLUG PREVIEW ── */
  .slug-preview {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
  }

  .slug-label {
    color: var(--muted);
    flex-shrink: 0;
  }

  .slug-value {
    color: var(--accent3);
    background: rgba(108, 252, 202, 0.08);
    border: 1px solid rgba(108, 252, 202, 0.2);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    letter-spacing: 0.04em;
    word-break: break-all;
  }

  /* ── PRESETS ── */
  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .preset-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,108,252,0.06);
  }

  .preset-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,108,252,0.1);
  }

  /* ── GENERATE BUTTON ── */
  .generate-btn {
    width: 100%;
    padding: 16px 24px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: white;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .generate-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(124,108,252,0.35);
  }

  .generate-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  .generate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .generate-btn .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  /* ── LOADING ── */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── STATUS MESSAGES ── */
  .status {
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-top: 16px;
  }

  .status.error {
    background: rgba(252,108,108,0.08);
    border: 1px solid rgba(252,108,108,0.25);
    color: var(--error);
  }

  .status.info {
    background: rgba(124,108,252,0.08);
    border: 1px solid rgba(124,108,252,0.25);
    color: #a09cf8;
  }

  .status-icon { flex-shrink: 0; font-size: 14px; }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    background: var(--surface2);
    border-radius: 100px;
    height: 3px;
    overflow: hidden;
    margin-top: 16px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.4s ease;
  }

  /* ── RESULT CARD ── */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeSlideUp 0.4s ease;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }

  .result-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .meta-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--muted);
  }

  .meta-tag.success {
    border-color: rgba(108,252,202,0.3);
    color: var(--accent3);
    background: rgba(108,252,202,0.06);
  }

  .image-preview {
    display: block;
    width: 100%;
    max-height: 400px;
    object-fit: contain;
    background: repeating-conic-gradient(#1a1a24 0% 25%, #111118 0% 50%) 0 0 / 20px 20px;
  }

  .result-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .filename-display {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filename-display span {
    color: var(--text);
    word-break: break-all;
  }

  .download-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(108,252,202,0.1);
    border: 1px solid rgba(108,252,202,0.3);
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent3);
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }

  .download-btn:hover {
    background: rgba(108,252,202,0.18);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(108,252,202,0.15);
  }

  /* ── PROVIDER BADGE ── */
  .provider-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .provider-strip a {
    color: var(--accent);
    text-decoration: none;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 540px) {
    .app { padding: 24px 16px 60px; }
    .card { padding: 20px; }
    .dim-row { grid-template-columns: 1fr 20px 1fr; }
  }
</style>
</head>
<body>
<div class="app" id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;

const API_BASE = window.location.origin;

const PRESETS = [
  { label: "Banner 1600×500", w: 1600, h: 500 },
  { label: "Hero 1920×600", w: 1920, h: 600 },
  { label: "Square 1080×1080", w: 1080, h: 1080 },
  { label: "OG Image 1200×630", w: 1200, h: 630 },
  { label: "YouTube Thumb 1280×720", w: 1280, h: 720 },
];

function generateSlugLocal(text) {
  return text
    .toLowerCase()
    .replace(/[^a-z0-9\s-]/g, "")
    .trim()
    .replace(/\s+/g, "-")
    .replace(/-+/g, "-")
    .replace(/^-|-$/g, "");
}

function buildFilenameLocal(slug, w, h) {
  return `${slug || "image"}-${w}x${h}.webp`;
}

function App() {
  const [prompt, setPrompt]       = useState("");
  const [width, setWidth]         = useState("1600");
  const [height, setHeight]       = useState("500");
  const [fileName, setFileName]   = useState("");
  const [loading, setLoading]     = useState(false);
  const [progress, setProgress]   = useState(0);
  const [error, setError]         = useState(null);
  const [result, setResult]       = useState(null); // { url, filename, size }
  const [activePreset, setActivePreset] = useState(0);
  const [statusMsg, setStatusMsg] = useState("");
  const intervalRef = useRef(null);

  const slug = generateSlugLocal(fileName || prompt || "");
  const previewFilename = slug ? buildFilenameLocal(slug, parseInt(width)||1600, parseInt(height)||500) : "";

  function selectPreset(idx) {
    setActivePreset(idx);
    setWidth(String(PRESETS[idx].w));
    setHeight(String(PRESETS[idx].h));
  }

  function startProgressSim() {
    setProgress(0);
    const steps = [
      [400,  12, "Cleaning prompt…"],
      [1200, 28, "Sending to image API…"],
      [3000, 55, "Generating image…"],
      [7000, 78, "Still generating…"],
      [11000,90, "Almost there…"],
    ];
    steps.forEach(([delay, pct, msg]) => {
      setTimeout(() => {
        setProgress(pct);
        setStatusMsg(msg);
      }, delay);
    });
  }

  async function handleGenerate() {
    if (!prompt.trim()) { setError("Please enter an image prompt."); return; }
    const w = parseInt(width, 10);
    const h = parseInt(height, 10);
    if (!w || !h || w < 50 || h < 50) { setError("Please enter valid dimensions (min 50)."); return; }

    setLoading(true);
    setError(null);
    setResult(null);
    startProgressSim();

    try {
      const response = await fetch(`${API_BASE}/api/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: prompt.trim(), width: w, height: h, fileName: fileName.trim() || prompt.trim() }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error || `Server error ${response.status}`);
      }

      const filename = response.headers.get("X-Filename") || previewFilename;
      const blob = await response.blob();
      const url = URL.createObjectURL(blob);

      setProgress(100);
      setStatusMsg("Done!");
      setResult({ url, filename, size: blob.size });

    } catch (err) {
      setError(err.message || "Something went wrong. Is the backend running?");
      setProgress(0);
    } finally {
      setLoading(false);
    }
  }

  function handleDownload() {
    if (!result) return;
    const a = document.createElement("a");
    a.href = result.url;
    a.download = result.filename;
    a.click();
  }

  return (
    <>
      <header>
        <div className="header-badge">
          <span className="dot" />
          Image Automation Tool
        </div>
        <h1>Generate.<br/>Resize. WebP.</h1>
        <p className="subtitle">Prompt → Resize → WebP → Download · No API key required</p>
      </header>

      {/* ── FORM ── */}
      <div className="card">
        <div className="card-title">01 — Configuration</div>

        <div className="field">
          <label>Image Prompt</label>
          <textarea
            value={prompt}
            onChange={e => setPrompt(e.target.value)}
            placeholder="e.g. aerial view of a mountain range at sunrise, golden hour, cinematic, wide angle"
          />
        </div>

        <div className="field">
          <label>Size Presets</label>
          <div className="presets">
            {PRESETS.map((p, i) => (
              <button
                key={i}
                className={`preset-btn${activePreset === i ? " active" : ""}`}
                onClick={() => selectPreset(i)}
              >
                {p.label}
              </button>
            ))}
          </div>
          <div className="dim-row">
            <div>
              <label>Width (px)</label>
              <input
                type="number"
                value={width}
                onChange={e => { setWidth(e.target.value); setActivePreset(-1); }}
                min="50" max="4096"
                placeholder="1600"
              />
            </div>
            <div className="dim-sep">×</div>
            <div>
              <label>Height (px)</label>
              <input
                type="number"
                value={height}
                onChange={e => { setHeight(e.target.value); setActivePreset(-1); }}
                min="50" max="4096"
                placeholder="500"
              />
            </div>
          </div>
        </div>

        <div className="field">
          <label>File Name (auto-slugified)</label>
          <input
            type="text"
            value={fileName}
            onChange={e => setFileName(e.target.value)}
            placeholder="e.g. mountain banner hero"
          />
          {previewFilename && (
            <div className="slug-preview">
              <span className="slug-label">→ filename:</span>
              <span className="slug-value">{previewFilename}</span>
            </div>
          )}
        </div>

        <button
          className="generate-btn"
          onClick={handleGenerate}
          disabled={loading}
        >
          <span className="btn-inner">
            {loading
              ? <><span className="spinner" />{statusMsg || "Generating…"}</>
              : <>✦ Generate Image</>}
          </span>
        </button>

        {loading && (
          <div className="progress-wrap" style={{ marginTop: 16 }}>
            <div className="progress-bar" style={{ width: `${progress}%` }} />
          </div>
        )}

        {error && (
          <div className="status error">
            <span className="status-icon">⚠</span>
            <span>{error}</span>
          </div>
        )}

        {loading && progress < 30 && (
          <div className="status info">
            <span className="status-icon">ℹ</span>
            <span>Tip: Image generation can take 10–30 seconds depending on the provider.</span>
          </div>
        )}
      </div>

      {/* ── RESULT ── */}
      {result && (
        <div className="result-card">
          <div className="result-header">
            <div className="result-meta">
              <span className="meta-tag success">✓ WebP</span>
              <span className="meta-tag">{width}×{height}px</span>
              <span className="meta-tag">{(result.size / 1024).toFixed(0)} KB</span>
            </div>
          </div>

          <img
            className="image-preview"
            src={result.url}
            alt="Generated"
          />

          <div className="result-footer">
            <div className="filename-display">
              📄 <span>{result.filename}</span>
            </div>
            <button className="download-btn" onClick={handleDownload}>
              ↓ Download
            </button>
          </div>
        </div>
      )}

      <div className="provider-strip">
        Powered by Pollinations AI · No API key needed ·
        <a href="https://pollinations.ai" target="_blank" rel="noopener">pollinations.ai</a>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
